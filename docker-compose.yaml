services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskdb
      MYSQL_USER: taskuser
      MYSQL_PASSWORD: taskpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m -Xmn128m"
    command: sh mqnamesrv
    healthcheck:
      # namesrv speaks the RocketMQ remoting protocol, not HTTP - probe for a
      # LISTEN socket on port 9876 (hex 2694) straight from procfs. Unlike the
      # old `echo > /dev/tcp/...` this needs no bash builtins - only grep, which
      # RocketMQ's own launch scripts already require - so it survives an image
      # swap to a bash-less variant. The two patterns match the IPv6 dual-stack
      # and plain IPv4 listen entries; state 0A is TCP_LISTEN.
      # (Rejected alternatives: mqadmin exits 0 even on connection failure and
      # boots a JVM per probe; curl telnet:// cannot exit 0 against a server
      # that sends no banner.)
      test:
        [
          "CMD",
          "grep",
          "-q",
          "-e", ":2694 00000000000000000000000000000000:0000 0A",
          "-e", ":2694 00000000:0000 0A",
          "/proc/net/tcp",
          "/proc/net/tcp6",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: rocketmq-broker
    depends_on:
      - rocketmq-namesrv
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms512m -Xmx512m -Xmn256m"
    volumes:
      - ./broker.conf:/home/rocketmq/rocketmq-5.1.4/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/rocketmq-5.1.4/conf/broker.conf

  rocketmq-console:
    image: styletang/rocketmq-console-ng:1.0.0
    container_name: rocketmq-console
    restart: always
    ports:
      - "8088:8080"
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876 -Dcom.rocketmq.sendMessageWithVIPChannel=false"
    depends_on:
      - rocketmq-namesrv

volumes:
  mysql_data:
  redis_data: