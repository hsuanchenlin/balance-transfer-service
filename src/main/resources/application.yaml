spring:
  application:
    name: demo

  datasource:
    url: jdbc:mysql://localhost:3306/taskdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: taskuser
    password: taskpass
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: balance-transfer-pool
      maximum-pool-size: 10

  data:
    redis:
      host: localhost
      port: 6379

# Transactional outbox relay: the scheduled poller that delivers committed
# outbox_event rows to RocketMQ (see event/OutboxRelay). Custom properties;
# tests set enabled=false and drive relay passes deterministically.
outbox:
  relay:
    enabled: true
    poll-interval-ms: 1000
    batch-size: 100

# RocketMQ is driven by the raw rocketmq-client (wired in ticket 06); these are custom properties.
rocketmq:
  enabled: true
  name-server: localhost:9876
  producer:
    group: balance-transfer-producer
  consumer:
    group: balance-transfer-consumer
  topic:
    transfer: transfer-events
