name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The integration tests (maven-failsafe *IT classes) self-provision MySQL and
      # Redis via singleton Testcontainers, using the Docker daemon that ubuntu-latest
      # runners provide. RocketMQ is not involved: tests run with
      # rocketmq.enabled=false and the live smoke test is skipped unless the
      # ROCKETMQ_SMOKE environment variable is set.
      # Runs unit + integration tests, the JaCoCo line-coverage gate (>= 90%),
      # and the SpotBugs gate (fails on High-priority findings).
      - name: Build and verify
        run: ./mvnw -B verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: ignore
