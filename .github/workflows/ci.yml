name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The integration tests (maven-failsafe *IT classes) hit the MySQL and Redis
      # from the repo's docker-compose stack on localhost. RocketMQ is not needed:
      # tests run with rocketmq.enabled=false and the live smoke test is @Disabled.
      - name: Start MySQL and Redis
        run: docker compose up -d --wait mysql redis

      # The compose healthcheck (mysqladmin ping) can pass while the entrypoint is
      # still applying init.sql, so wait until the seeded schema is queryable.
      - name: Wait for MySQL schema init
        run: |
          for _ in $(seq 1 30); do
            if docker compose exec -T mysql mysql -utaskuser -ptaskpass taskdb \
                 -e 'SELECT 1 FROM account LIMIT 1' >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo 'MySQL schema was not initialized in time' >&2
          docker compose logs mysql
          exit 1

      # Runs unit + integration tests, the JaCoCo line-coverage gate (>= 90%),
      # and the SpotBugs gate (fails on High-priority findings).
      - name: Build and verify
        run: ./mvnw -B verify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          if-no-files-found: ignore
