brokerClusterName = DefaultCluster
brokerName = broker-a
brokerId = 0
deleteWhen = 04
fileReservedTime = 48
listenPort = 10911
namesrvAddr = rocketmq-namesrv:9876
brokerRole = ASYNC_MASTER
flushDiskType = ASYNC_FLUSH
# Advertise a host-reachable address so clients running on the host (the app, tests)
# can reach the broker via the published port. Restart the broker after changing this.
brokerIP1 = 127.0.0.1
autoCreateTopicEnable = true
# The 5.x timer-wheel store (RMQ_SYS_WHEEL_TIMER delayed messages) is unused by this
# service, and its boot-time catch-up scan is pathologically slow on emulated Docker
# (x86 image under qemu on Apple Silicon). Disable it for fast, deterministic boots.
timerWheelEnable = false